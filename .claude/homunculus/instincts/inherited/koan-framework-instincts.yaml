# Koan Framework Workflow Add Or Evolve Entity With Rest Api

## Action

Follow the add-or-evolve-entity-with-rest-api workflow:
1. Create or update entity class in Models/ (e.g., Models/Project.cs, Models/SearchCategory.cs)
2. Add or update corresponding EntityController<T> in Controllers/ (e.g., Controllers/ProjectsController.cs, Controllers/SearchCategoryController.cs)
3. Register controller/service in KoanAutoRegistrar.cs or Startup/Program.cs
4. Optionally add seeder or initializer for default data (e.g., Bootstrap/SearchProfileSeeder.cs, Initialization/TagSeedInitializer.cs)
5. Update API client/types in UI (e.g., ui/src/api/types.ts, ui/src/api/searchProfiles.ts)
6. Expose new endpoints in API (e.g., /api/projects, /api/searchcategories, /api/tags)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/Services/code-intelligence/Koan.Service.KoanContext/Models/*.cs, src/Services/code-intelligence/Koan.Service.KoanContext/Controllers/*Controller.cs, src/Services/code-intelligence/Koan.Service.KoanContext/Initialization/KoanAutoRegistrar.cs

