# Koan Framework Workflow Data Layer Contract Migration

## Action

Follow the data-layer-contract-migration workflow:
1. Update or remove interfaces in src/Koan.Data.Abstractions/ (e.g., IDataRepositoryWithOptions, INamingProvider, ISchemaHealthContributor).
2. Refactor all adapter implementations in src/Connectors/Data/* to match the new contract.
3. Update RepositoryFacade, CachedRepository, and any decorators to match the new signatures.
4. Update or remove related static caches or helpers (e.g., AggregateConfigs, EntitySchemaGuard, NamingComposer).
5. Update all test projects and fakes/specs that referenced the old contracts.
6. Validate with the adapter surface matrix to ensure zero regression.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/Koan.Data.Abstractions/*, src/Koan.Data.Core/*, src/Koan.Cache/Decorators/CachedRepository.cs

