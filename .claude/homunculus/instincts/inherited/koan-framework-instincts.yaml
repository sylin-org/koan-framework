# Koan Framework Workflow Adapter Surface Matrix Expansion

## Action

Follow the adapter-surface-matrix-expansion workflow:
1. Add or update test projects under tests/Suites/Web/AdapterSurface/ or tests/Suites/Data/VectorAdapterSurface/ for each adapter.
2. Implement or update IAdapterTestFactory or IVectorAdapterTestFactory in the new test project.
3. Wire up spec base classes (e.g., AdapterSurfaceSpecsBase, AdapterPartitionSpecsBase, AdapterTransferSpecsBase, VectorAdapterSurfaceSpecsBase, etc.) in the test project.
4. Update shared test kit (TestKit) for new capabilities or spec bases as needed.
5. Update README.md in the relevant test kit to document adapter status and instructions.
6. Run the full matrix and update capability flags/skips as needed.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: tests/Suites/Web/AdapterSurface/Koan.Web.AdapterSurface.*.Tests/*, tests/Suites/Web/AdapterSurface/Koan.Web.AdapterSurface.TestKit/*, tests/Suites/Data/VectorAdapterSurface/Koan.Data.VectorAdapterSurface.*.Tests/*

