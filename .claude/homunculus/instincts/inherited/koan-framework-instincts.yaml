# Koan Framework Workflow Adapter Bugfix Driven By Matrix

## Action

Follow the adapter-bugfix-driven-by-matrix workflow:
1. Identify failing or skipped specs in the matrix and diagnose root cause.
2. Update the affected adapter implementation (e.g., src/Connectors/Data/*/*Repository.cs or *AdapterFactory.cs).
3. If needed, update shared abstractions or test kit to support the fix.
4. Validate the fix by rerunning the full matrix and confirming all relevant specs pass.
5. Document the fix in the adapter surface README or relevant ADR if architectural.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/Connectors/Data/*/*Repository.cs, src/Connectors/Data/*/*AdapterFactory.cs, src/Koan.Data.Abstractions/*

