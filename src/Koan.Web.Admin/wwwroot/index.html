<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Koan Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">KOAN / DEVELOPMENT</p>
      <h1>Runtime truth, without a second control plane.</h1>
    </div>
    <button id="refresh" type="button">Refresh</button>
  </header>

  <main>
    <section id="notice" class="notice" hidden></section>

    <section class="summary" aria-label="Runtime summary">
      <article><span>Environment</span><strong id="environment">—</strong></article>
      <article><span>Modules</span><strong id="module-count">—</strong></article>
      <article><span>Health</span><strong id="health-state">—</strong></article>
      <article><span>Uptime</span><strong id="uptime">—</strong></article>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <div><p class="eyebrow">PROCESS</p><h2>Bounded runtime facts</h2></div>
        <span id="captured-at" class="muted"></span>
      </div>
      <div id="runtime" class="fact-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-heading"><div><p class="eyebrow">HEALTH</p><h2>Current contributors</h2></div></div>
      <div id="health" class="stack"></div>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <div><p class="eyebrow">COMPOSITION</p><h2>Modules, settings, notes, and tools</h2></div>
        <input id="filter" type="search" placeholder="Filter modules or settings" aria-label="Filter modules">
      </div>
      <div id="modules" class="stack"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
