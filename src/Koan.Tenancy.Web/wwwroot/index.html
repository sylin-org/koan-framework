<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koan Tenancy — Operator Console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Koan Tenancy · <span class="muted">Operator Console</span></div>
    <div class="meta">
      <span id="posture" class="badge">…</span>
      <span id="operator" class="muted"></span>
    </div>
  </header>

  <main class="layout">
    <section class="panel fleet">
      <div class="panel-head">
        <h2>Tenant registry</h2>
        <button id="new-tenant" class="primary" type="button">+ New tenant</button>
      </div>
      <table class="grid" id="fleet-table">
        <thead><tr><th>Tenant</th><th>Code</th><th class="num">Seats</th></tr></thead>
        <tbody id="fleet-body"><tr><td colspan="3" class="muted">Loading…</td></tr></tbody>
      </table>
    </section>

    <section class="panel detail" id="detail" hidden>
      <div class="panel-head">
        <h2 id="detail-name">—</h2>
        <button class="ghost" id="detail-close" type="button">✕</button>
      </div>
      <div class="detail-meta"><span class="muted" id="detail-id"></span></div>
      <div class="actions" id="detail-actions">
        <button data-act="rename" type="button">Rename</button>
        <button data-act="grant" type="button">Grant membership…</button>
      </div>

      <h3>Memberships</h3>
      <table class="grid" id="members-table">
        <thead><tr><th>Subject</th><th>Roles</th><th></th></tr></thead>
        <tbody id="members-body"></tbody>
      </table>
    </section>
  </main>

  <section class="panel feeds">
    <div class="panel-head"><h2>Recent administration audit</h2></div>
    <table class="grid">
      <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Tenant</th><th>Summary</th></tr></thead>
      <tbody id="audit-body"><tr><td colspan="5" class="muted">Loading…</td></tr></tbody>
    </table>
  </section>

  <div id="toast" class="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
