name: koan-s6-snapvault
services:
  api:
    build:
      context: ../../..
      dockerfile: samples/S6.SnapVault/Dockerfile
    image: koan-s6-snapvault:dev
    ports:
      - "5086:5086"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5086"

      # Full Zen Garden topology:
      # - MongoDB, Ollama, and Weaviate are all resolved via Zen Garden (host Moss).
      Koan__ZenGarden__RequireHostMossWhenContainerized: "true"
      Koan__ZenGarden__ContainerHost: "host.docker.internal"
      Koan__ZenGarden__ContainerHostPort: "7185"
      KOAN_ZENGARDEN_CACHE_PATH: "/app/cache/zen-garden"
    volumes:
      - ../.Koan/Data:/app/data
      - ../.Koan/cache:/app/cache
      - ../.Koan/storage:/app/storage

volumes: {}
