<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Gallery · SnapVault</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #14151a; color: #e8e8ea; }
    header { padding: 20px 24px; border-bottom: 1px solid #2a2b31; display: flex; align-items: baseline; gap: 12px; }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .sub { color: #8a8b92; font-size: 13px; }
    #status { padding: 24px; color: #b7b8bf; }
    #status a { color: #7aa2ff; }
    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; padding: 18px; }
    .guest-card { margin: 0; background: #1c1d23; border: 1px solid #2a2b31; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .guest-card.selected { border-color: #f2c14e; box-shadow: 0 0 0 1px #f2c14e; }
    .guest-card img { width: 100%; aspect-ratio: 3/2; object-fit: cover; display: block; background: #101116; }
    figcaption { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .pick { background: none; border: 1px solid #3a3b44; color: #e8e8ea; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px; }
    .pick[aria-pressed="true"] { background: #f2c14e; color: #14151a; border-color: #f2c14e; }
    .stars button { background: none; border: none; color: #4a4b54; cursor: pointer; font-size: 16px; padding: 0 1px; }
    .stars button.on { color: #f2c14e; }
    footer { padding: 16px 24px; color: #6a6b72; font-size: 12px; border-top: 1px solid #2a2b31; }
  </style>
</head>
<body>
  <header>
    <h1>Your Gallery</h1>
    <span class="sub">Select the photos you love. Your picks are private to you and shared only with your studio.</span>
  </header>
  <div id="status">Opening your gallery…</div>
  <div id="gallery" hidden></div>
  <footer>Powered by SnapVault · your selections are recorded as you tap.</footer>

  <script type="module" src="./js/guest.js"></script>
</body>
</html>
