name: koan-devportal

services:
  mongo:
    image: mongo:7.0
    ports:
      - "5091:27017"
    environment:
      MONGO_INITDB_DATABASE: DevPortalDocuments
    volumes:
      - ../.koan/mongo:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/DevPortalDocuments --quiet
      interval: 2s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    ports:
      - "5092:5432"
    environment:
      POSTGRES_DB: devportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - ../.koan/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devportal"]
      interval: 2s
      timeout: 5s
      retries: 20
