<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garden Cooperative · Local semantic search</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Garden Cooperative · embedded</p>
      <h1>Find produce by meaning.</h1>
      <p class="lede">Rows, vectors, and embeddings all run locally. Try describing what you want—not its exact name.</p>
    </header>

    <form id="search">
      <label for="query">What are you looking for?</label>
      <div class="search-row">
        <input id="query" name="q" value="ripe red tomato" autocomplete="off" required>
        <button type="submit">Search locally</button>
      </div>
    </form>

    <p id="status" role="status">Loading the local index…</p>
    <ol id="results"></ol>

    <footer>
      <span>SQLite + sqlite-vec + ONNX · no external services</span>
      <a href="/.well-known/Koan/facts">Inspect Koan facts</a>
    </footer>
  </main>

  <script>
    const form = document.querySelector('#search');
    const query = document.querySelector('#query');
    const status = document.querySelector('#status');
    const results = document.querySelector('#results');

    async function search() {
      status.textContent = 'Searching the bundled model and local vector index…';
      results.replaceChildren();

      try {
        const response = await fetch(`/api/produce/search?q=${encodeURIComponent(query.value)}&k=5`);
        if (!response.ok) throw new Error(await response.text());
        const hits = await response.json();

        for (const [index, hit] of hits.entries()) {
          const item = document.createElement('li');
          const rank = document.createElement('span');
          const description = document.createElement('div');
          const name = document.createElement('strong');
          const category = document.createElement('small');
          const score = document.createElement('output');

          rank.className = 'rank';
          rank.textContent = index + 1;
          name.textContent = hit.name;
          category.textContent = hit.category;
          score.textContent = hit.score.toFixed(3);
          description.append(name, category);
          item.append(rank, description, score);
          results.append(item);
        }
        status.textContent = `${hits.length} local matches for “${query.value}”.`;
      } catch (error) {
        status.textContent = 'Search failed. Inspect the application log for the corrective detail.';
        console.error(error);
      }
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      search();
    });
    search();
  </script>
</body>
</html>
