version: '3.8'

services:
  prism:
    build:
      context: ../..
      dockerfile: samples/S18.Prism/Dockerfile
    ports:
      - "5087:5087"
    environment:
      - ASPNETCORE_URLS=http://+:5087
      - ASPNETCORE_ENVIRONMENT=Development
      - Koan__Data__Mongo__ConnectionString=mongodb://mongo:27017
      - Koan__Data__Mongo__Database=Prism
      - Koan__Storage__Providers__Local__BasePath=/app/storage
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./.Koan/storage:/app/storage
      - ./.Koan/cache:/app/cache
    depends_on:
      mongo:
        condition: service_healthy
      weaviate:
        condition: service_healthy

  mongo:
    image: mongo:7
    volumes:
      - ./.Koan/Data/mongo:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.27.6
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'  # Local dev only — restrict in production
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - ./.Koan/Data/weaviate:/var/lib/weaviate
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./.Koan/Data/ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
