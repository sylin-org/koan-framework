version: '3.8'

services:
  stone-01:
    build:
      context: ../src/linux/moss
      dockerfile: Dockerfile
    container_name: stone-01
    hostname: stone-01
    ports:
      - "3011:3001"
      - "3014:3004/udp"
    environment:
      - STONE_NAME=stone-01
      - STONE_HOST=stone-01
      - RUST_LOG=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      garden:
        ipv4_address: 172.20.0.11

  stone-02:
    build:
      context: ../src/linux/moss
      dockerfile: Dockerfile
    container_name: stone-02
    hostname: stone-02
    ports:
      - "3021:3001"
      - "3024:3004/udp"
    environment:
      - STONE_NAME=stone-02
      - STONE_HOST=stone-02
      - RUST_LOG=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      garden:
        ipv4_address: 172.20.0.12

  stone-03:
    build:
      context: ../src/linux/moss
      dockerfile: Dockerfile
    container_name: stone-03
    hostname: stone-03
    ports:
      - "3031:3001"
      - "3034:3004/udp"
    environment:
      - STONE_NAME=stone-03
      - STONE_HOST=stone-03
      - RUST_LOG=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      garden:
        ipv4_address: 172.20.0.13

networks:
  garden:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
