# Network Printer - Borrowed Offering (External Network Device)
name: network-printer
category: device
description: Network printer via IPP
modes:
  - borrowed

# Location configuration
location:
  host: printer.local
  port: 631
  protocol: ipp

# Health monitoring
health:
  method: http
  endpoint: http://printer.local:631
  interval_secs: 120

connection_template: "ipp://{{host}}:{{port}}/ipp/print"
