# PostgreSQL Database - Multi-Mode Offering (Managed + Adopted)
name: postgresql
category: database
description: PostgreSQL relational database
modes:
  - managed
  - adopted

# Managed mode configuration (container-based)
image: postgres:16-alpine
ports:
  - host: 5432
    container: 5432

environment:
  - name: POSTGRES_PASSWORD
    value: postgres
  - name: POSTGRES_DB
    value: postgres

volumes:
  - host: postgres-data
    container: /var/lib/postgresql/data

# Detection configuration for adopted mode
detection:
  - method: command
    config:
      command: psql --version
      expected_pattern: "psql \\(PostgreSQL\\) (\\d+\\.\\d+)"

  - method: command
    config:
      command: pg_isready -h localhost -p 5432
      expected_exit_code: 0

  - method: container_inspect
    config:
      container_pattern: "postgres|pg_"
      image_pattern: "postgres:.*"

# Control configuration for adopted mode
control:
  level: monitor
  health_check_url: postgres://localhost:5432

# Health monitoring
health:
  method: tcp
  endpoint: localhost:5432
  interval_secs: 30
