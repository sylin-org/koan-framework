# Ollama AI Runtime - Tier 1 Minimal Adopted Offering
name: ollama
category: ai
description: Ollama local LLM runtime
modes:
  - adopted

detection:
  - method: command
    config:
      command: ollama --version
      expected_pattern: "ollama version"

  - method: http_probe
    config:
      url: http://localhost:11434/api/tags
      expected_status: 200

control:
  level: monitor
  health_check_url: http://localhost:11434/api/tags
