# Authelia Compatibility Rules
# Apache 2.0 licensed authentication/authorization server
# Multi-arch support: amd64, arm64, arm32v7
# No AVX/SSE requirements (Go binary)
version: "1"

compatibility_rules:
  - name: "arm32v6-not-supported"
    condition:
      architectures: ["armv6l"]
    reason: "Authelia Docker image requires ARMv7 or newer"
    suggestion: "Use Raspberry Pi 2 or newer (ARM32v7+) or ARM64 device"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 64
    reason: "Authelia requires at least 64MB RAM"
    suggestion: "Increase stone memory allocation"

  - name: "argon2-memory-warning"
    condition:
      memory_mb_less_than: 128
    reason: "Argon2id password hashing may require additional memory"
    suggestion: "Consider 128MB+ RAM if using file-based user provider with Argon2id"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 100
  timeout_seconds: 30
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Authelia"
      suggestion: "Increase RAM or adjust argon2id memory parameter"

    - pattern: "config.*error|yaml.*invalid"
      reason: "Configuration file error"
      suggestion: "Check configuration.yml syntax and required fields"

    - pattern: "address already in use"
      reason: "Port 9091 already in use"
      suggestion: "Stop conflicting service or change Authelia port"

    - pattern: "failed to connect.*storage|database.*error"
      reason: "Storage backend connection failed"
      suggestion: "Check database connection settings (SQLite, PostgreSQL, MySQL)"

    - pattern: "failed to load.*secret|jwt.*error"
      reason: "Secret configuration error"
      suggestion: "Ensure jwt_secret and other secrets are properly configured"
