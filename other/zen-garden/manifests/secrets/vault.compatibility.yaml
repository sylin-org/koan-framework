# Vault Compatibility Rules
# HashiCorp Vault - BSL licensed (since Aug 2023)
# Lightweight Go binary - excellent multi-arch support
# Supported architectures: amd64, arm64, arm, 386
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 256
    reason: "Vault requires at least 256MB RAM for stable operation"
    suggestion: "Increase stone memory or run fewer services"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 200
  timeout_seconds: 30
  patterns:
    - pattern: "Failed to lock memory|mlock:.*permission denied"
      reason: "Vault attempted to lock memory (mlock) but host/container lacks permission"
      suggestion: "Ensure IPC_LOCK capability is enabled (cap_add: IPC_LOCK) or set disable_mlock=true"

    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Vault"
      suggestion: "Increase stone RAM or reduce service count"

    - pattern: "error initializing listener|bind:.*address already in use"
      reason: "Port 8200 is already in use"
      suggestion: "Stop conflicting service or change Vault port"

    - pattern: "seal configuration missing|no seal config"
      reason: "Production mode requires seal configuration"
      suggestion: "Use dev mode for development or configure a seal for production"

    - pattern: "permission denied.*storage"
      reason: "Storage backend permission issue"
      suggestion: "Check volume permissions for Vault data directory"
