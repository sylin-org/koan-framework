# Homepage Compatibility Rules
# GPL-3.0 licensed application dashboard
# Excellent multi-arch support: amd64, arm64, armv7, armv6
# No AVX/SSE requirements (Node.js)
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 64
    reason: "Homepage requires at least 64MB RAM"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 128
    reason: "Homepage with many widgets benefits from 128MB+ RAM"
    suggestion: "Consider increasing RAM for complex dashboards with many service integrations"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 100
  timeout_seconds: 30
  patterns:
    - pattern: "Cannot allocate memory|OOM|heap out of memory"
      reason: "Insufficient memory for Homepage"
      suggestion: "Increase RAM allocation"

    - pattern: "address already in use"
      reason: "Port 3000 already in use"
      suggestion: "Stop conflicting service or change Homepage port"

    - pattern: "permission denied.*docker.sock"
      reason: "Cannot access Docker socket"
      suggestion: "Check Docker socket permissions and PUID/PGID settings"

    - pattern: "YAML.*error|config.*invalid"
      reason: "Configuration file error"
      suggestion: "Check services.yaml and settings.yaml syntax"
