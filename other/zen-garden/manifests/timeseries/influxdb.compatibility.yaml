# InfluxDB Compatibility Rules
# MIT licensed time series database
# Multi-arch support: amd64, arm64v8
# ARM32 not officially supported
# No AVX/SSE requirements (Go binary)
version: "1"

compatibility_rules:
  - name: "arm32-not-supported"
    condition:
      architectures: ["armv7l", "armv6l"]
    reason: "InfluxDB does not officially support ARM32 architectures"
    suggestion: "Use ARM64 device (Pi 4+, Pi Zero 2 W) or x86_64"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 256
    reason: "InfluxDB requires at least 256MB RAM for basic operation"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 512
    reason: "InfluxDB benefits from 512MB+ RAM for reliable operation"
    suggestion: "Consider increasing RAM for time series workloads"
    warn_only: true

  - name: "production-memory-warning"
    condition:
      memory_mb_less_than: 2048
    reason: "InfluxDB production deployments typically need 2GB+ RAM"
    suggestion: "For high-cardinality workloads, consider 2GB+ RAM"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 150
  timeout_seconds: 60
  patterns:
    - pattern: "Cannot allocate memory|OOM|out of memory"
      reason: "Insufficient memory for InfluxDB"
      suggestion: "Increase RAM or reduce series cardinality"

    - pattern: "address already in use"
      reason: "Port 8086 already in use"
      suggestion: "Stop conflicting service or change InfluxDB port"

    - pattern: "disk.*full|no space left"
      reason: "Disk space exhausted"
      suggestion: "Increase storage or reduce retention period"

    - pattern: "bolt.*error|database.*corrupted"
      reason: "Database corruption detected"
      suggestion: "Check disk health and consider restore from backup"

    - pattern: "series cardinality.*exceeded|too many series"
      reason: "Series cardinality too high"
      suggestion: "Reduce tag cardinality or increase memory"
