# Traefik Compatibility Rules
# MIT licensed cloud-native reverse proxy
# Excellent multi-arch support: amd64, arm32v6, arm64v8, ppc64le, riscv64, s390x
# No AVX/SSE requirements (Go binary)
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 64
    reason: "Traefik requires at least 64MB RAM for basic operation"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 128
    reason: "Traefik with many routes benefits from 128MB+ RAM"
    suggestion: "Consider increasing RAM for complex routing configurations"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 100
  timeout_seconds: 30
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Traefik"
      suggestion: "Increase RAM allocation"

    - pattern: "address already in use|bind.*failed"
      reason: "Port 80, 443, or 8080 already in use"
      suggestion: "Stop conflicting service or change Traefik ports"

    - pattern: "permission denied.*docker.sock"
      reason: "Cannot access Docker socket"
      suggestion: "Check Docker socket permissions and mount"

    - pattern: "certificate.*error|acme.*failed"
      reason: "Let's Encrypt certificate issue"
      suggestion: "Check domain DNS and ACME configuration"

    - pattern: "invalid configuration|yaml.*error"
      reason: "Configuration file error"
      suggestion: "Check traefik.yml syntax"
