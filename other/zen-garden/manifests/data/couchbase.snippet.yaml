container_name: couchbase
image: couchbase:community
ports:
  - "8091-8096:8091-8096"
  - "11210:11210"
volumes:
  - couchbase-data:/opt/couchbase/var
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:8091/ui/index.html"]
  interval: 30s
  timeout: 10s
  retries: 5
restart: unless-stopped
networks:
  - zen-garden
