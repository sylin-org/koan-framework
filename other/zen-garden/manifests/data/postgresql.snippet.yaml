container_name: postgresql
image: pgvector/pgvector:pg16
ports:
  - "5432:5432"
environment:
  POSTGRES_PASSWORD: postgres
volumes:
  - postgres-data:/var/lib/postgresql/data
healthcheck:
  test: ["CMD-SHELL", "pg_isready -U postgres"]
  interval: 10s
  timeout: 5s
  retries: 5
restart: unless-stopped
networks:
  - zen-garden
