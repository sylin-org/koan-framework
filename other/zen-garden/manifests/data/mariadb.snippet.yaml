container_name: mariadb
image: mariadb:11
ports:
  - "3306:3306"
environment:
  MARIADB_ROOT_PASSWORD: mariadb
  MARIADB_DATABASE: zendb
volumes:
  - mariadb-data:/var/lib/mysql
healthcheck:
  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s
restart: unless-stopped
networks:
  - zen-garden
