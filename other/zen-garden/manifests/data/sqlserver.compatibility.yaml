# SQL Server (Linux container) Compatibility Rules

version: "1"

compatibility_rules:
  - name: "non-x86_64-unsupported"
    condition:
      architectures: ["aarch64", "arm64", "armv7l", "armv6l"]
    reason: "SQL Server Linux container images are supported only on x86_64 (amd64)"
    suggestion: "Use PostgreSQL or MongoDB on ARM, or move to x86_64 hardware"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 2048
    reason: "SQL Server containers require at least ~2GB RAM"
    suggestion: "Increase stone memory or choose PostgreSQL instead"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 60
  patterns:
    - pattern: "no matching manifest for linux/arm64|no matching manifest for linux/arm/v7"
      reason: "SQL Server image does not support this architecture"
      suggestion: "Use PostgreSQL on ARM, or run SQL Server on x86_64"

    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for SQL Server"
      suggestion: "Increase stone RAM or reduce service count"
