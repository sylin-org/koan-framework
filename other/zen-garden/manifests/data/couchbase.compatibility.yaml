# Couchbase Compatibility Rules

version: "1"

compatibility_rules:
  - name: "armv6-unsupported"
    condition:
      architectures: ["armv6l"]
    reason: "Couchbase container images generally require 64-bit CPUs; ARMv6 is unsupported"
    suggestion: "Upgrade to ARMv8 (aarch64) or x86_64"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 2048
    reason: "Couchbase Server requires substantial RAM; <2GB is typically unstable"
    suggestion: "Increase stone memory or choose PostgreSQL/Redis instead"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 45
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Couchbase"
      suggestion: "Increase stone RAM or reduce service count"
