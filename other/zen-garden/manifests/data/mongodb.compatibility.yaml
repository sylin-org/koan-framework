# MongoDB Compatibility Rules
# Ensures MongoDB offerings work across diverse stone hardware

version: "1"

# Pre-install compatibility checks (evaluated in order, first match wins)
compatibility_rules:
  # Known incompatible processors (Tier 1: Fastest)
  - name: "j4105-celeron-no-avx"
    condition:
      processor_patterns:
        - "J4105"
        - "J3455"
        - "J3160"
    reason: "Celeron J-series processors lack AVX extensions required by MongoDB 5+"
    fallback:
      image: "mongo:4.4"

  # CPU feature detection (Tier 2: Fast)
  - name: "missing-avx-feature"
    condition:
      cpu_features_missing: ["avx"]
    reason: "MongoDB 5.0+ requires AVX CPU support"
    fallback:
      image: "mongo:4.4"

  # Older processors without SSE4.2
  - name: "missing-sse42-feature"
    condition:
      cpu_features_missing: ["sse4_2"]
    reason: "MongoDB 4.4+ requires SSE4.2 CPU support"
    fallback:
      image: "mongo:4.2"

  # ARMv6 unsupported (no fallback = deny)
  - name: "armv6-unsupported"
    condition:
      architectures: ["armv6l"]
    reason: "MongoDB requires ARMv7 or later architecture"
    suggestion: "Upgrade to ARMv7/ARMv8 hardware or use a lighter database"

  # Insufficient memory (no fallback = deny)
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 512
    reason: "MongoDB requires at least 512MB of RAM"
    suggestion: "Increase stone memory or use Redis/SQLite instead"

# Post-install healthcheck (Tier 3: Catches runtime issues)
post_install_healthcheck:
  enabled: true
  scan_log_lines: 100
  timeout_seconds: 30
  
  patterns:
    # AVX runtime detection
    - pattern: "MongoDB 5\\.0\\+ requires a CPU with AVX support"
      reason: "CPU incompatibility detected at runtime"
      fallback:
        image: "mongo:4.4"
    
    # Illegal instruction (CPU instruction set mismatch)
    - pattern: "Illegal instruction"
      reason: "CPU instruction set incompatibility"
      fallback:
        image: "mongo:4.2"
    
    # Out of disk space (no fallback)
    - pattern: "WiredTiger error.*ENOSPC|No space left on device"
      reason: "Insufficient disk space for MongoDB data"
      suggestion: "Free up disk space: docker system prune -af"
    
    # Memory allocation failure (no fallback)
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for MongoDB"
      suggestion: "Increase stone RAM or reduce service count"
