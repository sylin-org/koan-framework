# OpenSearch Compatibility Rules

version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 2048
    reason: "OpenSearch typically needs >= 2GB RAM on the host for reliable operation"
    suggestion: "Increase stone memory or choose a lighter offering"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 45
  patterns:
    - pattern: "max virtual memory areas vm\\.max_map_count \\[\\d+\\] is too low"
      reason: "Host kernel setting vm.max_map_count is too low"
      suggestion: "Set vm.max_map_count=262144 (e.g., sysctl -w vm.max_map_count=262144) and retry"

    - pattern: "OutOfMemoryError|Cannot allocate memory|OOM"
      reason: "Insufficient memory for OpenSearch"
      suggestion: "Increase stone RAM and/or reduce JVM heap (OPENSEARCH_JAVA_OPTS), then retry"
