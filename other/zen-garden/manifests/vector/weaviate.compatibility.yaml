# Weaviate Compatibility Rules

version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 2048
    reason: "Weaviate typically needs >= 2GB RAM for stable operation"
    suggestion: "Increase stone memory or use PostgreSQL (pgvector) for smaller workloads"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 45
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Weaviate"
      suggestion: "Increase stone RAM or reduce service count"
