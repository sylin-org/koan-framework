# Weaviate Vector Database Compatibility Rules
#
# Architecture Support: amd64, arm64
# CPU Features: Uses SIMD (AVX-256/512) with fallback for non-AVX systems
# Memory: ~3GB per 1M vectors; minimum 2GB for basic operation

version: "1"

compatibility_rules:
  # Memory requirement - Weaviate needs significant RAM for vector operations
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 2048
    reason: "Weaviate requires >= 2GB RAM for stable operation with vector workloads"
    suggestion: "Increase system memory or use PostgreSQL with pgvector for smaller deployments"

  # Low-end Celeron/Atom CPUs - AVX support is uncertain
  # Weaviate uses SIMD for 40-60% of vector distance calculations
  # While it has fallback code, these CPUs may experience issues
  - name: "celeron-j-series-avx-warning"
    condition:
      processor_patterns: ["J4105", "J3455", "J3160", "J4005", "J5005", "N4100", "N5000"]
    reason: "Celeron J/N-series CPUs lack AVX; Weaviate SIMD optimizations may cause issues"
    suggestion: "Monitor for SIGILL errors; consider Milvus Lite or pgvector as alternatives"
    warn_only: true  # Proceed with caution - Weaviate has fallback code

  # Very old CPUs without SSE4.2 (pre-2008)
  - name: "missing-sse42"
    condition:
      cpu_features_missing: ["sse4_2"]
    reason: "Weaviate requires at least SSE4.2 for basic operations"
    suggestion: "Upgrade to a CPU with SSE4.2 support (Intel Nehalem+ or AMD Bulldozer+)"
    warn_only: true  # May still work, but performance will be severely degraded

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 60
  patterns:
    # Memory allocation failures
    - pattern: "Cannot allocate memory|OOM|out of memory"
      reason: "Insufficient memory for Weaviate vector operations"
      suggestion: "Increase system RAM or reduce concurrent operations"

    # Illegal instruction - indicates CPU compatibility issue
    - pattern: "SIGILL|illegal instruction|signal 4"
      reason: "CPU instruction compatibility issue - likely missing AVX support"
      suggestion: "Your CPU may not support required instructions; try pgvector or Milvus Lite"

    # Index corruption or loading failures
    - pattern: "failed to load index|index corrupted|cannot restore"
      reason: "Vector index corruption or incompatible data"
      suggestion: "Clear data volume and re-import; check disk space and filesystem health"

    # gRPC binding issues
    - pattern: "failed to bind.*50051|grpc.*address already in use"
      reason: "gRPC port 50051 is already in use"
      suggestion: "Check for other services using port 50051 or change the gRPC port"
