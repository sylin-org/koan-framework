# Ollama Compatibility Rules

version: "1"

compatibility_rules:
  - name: "no-ai-runtime"
    condition:
      requires_ai_any: ['cuda', 'rocm', 'directml', 'openvino']
    reason: "Ollama requires GPU acceleration for optimal performance"
    suggestion: "This stone has no AI-capable GPU (CUDA/ROCm/DirectML/OpenVINO). Ollama will run in CPU-only mode with significantly degraded performance. Consider installing on a stone with GPU support."

  - name: "insufficient-vram"
    condition:
      vram_mb_at_least: 4096
    reason: "Most Ollama models require at least 4GB VRAM for GPU acceleration"
    suggestion: "Available VRAM is below 4GB. Larger models may fall back to CPU or fail to load. Consider using smaller quantized models or upgrading GPU."

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 4096
    reason: "Ollama runs large models; <4GB RAM is likely insufficient for most use"
    suggestion: "Increase stone memory or use smaller models / a remote inference service"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 45
  patterns:
    - pattern: "Illegal instruction"
      reason: "CPU instruction set incompatibility"
      suggestion: "Use newer CPU hardware or a different runtime/build"

    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Ollama"
      suggestion: "Increase stone RAM or load smaller models"
