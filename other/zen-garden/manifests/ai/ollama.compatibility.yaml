# Ollama Compatibility Rules

version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 4096
    reason: "Ollama runs large models; <4GB RAM is likely insufficient for most use"
    suggestion: "Increase stone memory or use smaller models / a remote inference service"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 250
  timeout_seconds: 45
  patterns:
    - pattern: "Illegal instruction"
      reason: "CPU instruction set incompatibility"
      suggestion: "Use newer CPU hardware or a different runtime/build"

    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Ollama"
      suggestion: "Increase stone RAM or load smaller models"
