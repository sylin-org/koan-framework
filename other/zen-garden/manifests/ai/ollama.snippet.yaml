container_name: ollama
image: ollama/ollama:0.5
ports:
  - "11434:11434"
volumes:
  - ollama-data:/root/.ollama
environment:
  OLLAMA_HOST: 0.0.0.0:11434
healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s
restart: unless-stopped
networks:
  - zen-garden
