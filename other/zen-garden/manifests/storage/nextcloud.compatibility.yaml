# Nextcloud Compatibility Rules
# AGPL v3 licensed self-hosted cloud platform
# Excellent multi-arch support: amd64, arm64, arm32v7, arm32v6, arm32v5, i386, ppc64le, riscv64, s390x
# No AVX/SSE requirements (PHP application)
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 256
    reason: "Nextcloud requires at least 256MB RAM for basic operation"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 512
    reason: "Nextcloud recommends 512MB+ RAM per process for comfortable operation"
    suggestion: "Consider increasing RAM for multiple users and apps"
    warn_only: true

  - name: "recommended-memory"
    condition:
      memory_mb_less_than: 1024
    reason: "Nextcloud with apps and preview generation benefits from 1GB+ RAM"
    suggestion: "For production use with multiple users, consider 1GB+ RAM"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 200
  timeout_seconds: 180
  patterns:
    - pattern: "Cannot allocate memory|OOM|Allowed memory size.*exhausted"
      reason: "Insufficient memory for Nextcloud"
      suggestion: "Increase RAM or PHP_MEMORY_LIMIT"

    - pattern: "address already in use"
      reason: "Port 80 already in use"
      suggestion: "Stop conflicting service or change Nextcloud port"

    - pattern: "SQLSTATE.*Connection refused|database.*error"
      reason: "Database connection failed"
      suggestion: "Check database host, credentials, and ensure database service is running"

    - pattern: "Trusted domain.*not configured"
      reason: "Access from untrusted domain"
      suggestion: "Add domain to NEXTCLOUD_TRUSTED_DOMAINS"

    - pattern: "Permission denied|write.*failed"
      reason: "File permission error"
      suggestion: "Check volume permissions and ownership"

    - pattern: "preview.*killed|imagick.*error"
      reason: "Preview generation resource exhaustion"
      suggestion: "Increase memory limits or disable preview generation for large files"
