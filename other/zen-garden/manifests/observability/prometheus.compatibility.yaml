# Prometheus Compatibility Rules
# Apache 2.0 licensed metrics collection (CNCF graduated)
# Go binary with excellent multi-arch support: amd64, arm64, armv7, armv6
# No AVX/SSE requirements
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 256
    reason: "Prometheus requires at least 256MB RAM for TSDB operations"
    suggestion: "Increase stone memory or reduce retention period"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 512
    reason: "Prometheus memory usage grows with metric count and retention"
    suggestion: "Consider increasing RAM for larger deployments"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 150
  timeout_seconds: 30
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Prometheus"
      suggestion: "Increase RAM or reduce retention period/scrape targets"

    - pattern: "opening storage failed|corrupted"
      reason: "TSDB storage corruption or access issue"
      suggestion: "Check data volume permissions or rebuild TSDB"

    - pattern: "error loading config|yaml:.*error"
      reason: "Configuration file error"
      suggestion: "Check prometheus.yml syntax"

    - pattern: "context deadline exceeded|scrape.*failed"
      reason: "Scrape target unreachable or slow"
      suggestion: "Check target connectivity and increase scrape timeout if needed"
