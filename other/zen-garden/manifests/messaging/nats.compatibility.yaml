# NATS Compatibility Rules
# Apache 2.0 licensed lightweight messaging system
# Excellent multi-arch support: amd64, arm64, arm/v7, arm/v6, 386, ppc64le, s390x
# Very low resource requirements - ideal for edge/IoT
version: "1"

compatibility_rules:
  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 64
    reason: "NATS is lightweight but requires at least 64MB RAM"
    suggestion: "Increase stone memory"

post_install_healthcheck:
  enabled: true
  scan_log_lines: 100
  timeout_seconds: 15
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for NATS"
      suggestion: "Increase stone RAM"

    - pattern: "bind:.*address already in use"
      reason: "NATS port already in use"
      suggestion: "Stop conflicting service or change NATS port"

    - pattern: "JetStream.*error|jetstream.*failed"
      reason: "JetStream initialization failed"
      suggestion: "Check data volume permissions and disk space"

    - pattern: "Error loading|config.*error"
      reason: "Configuration error"
      suggestion: "Check NATS configuration syntax"
