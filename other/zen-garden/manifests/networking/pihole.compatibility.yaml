# Pi-hole Compatibility Rules
# EUPL v1.2 licensed network-wide ad blocking
# Multi-arch support: amd64, arm64, arm32v7
# No AVX/SSE requirements
version: "1"

compatibility_rules:
  - name: "arm32v6-not-supported"
    condition:
      architectures: ["armv6l"]
    reason: "Pi-hole Docker image requires ARMv7 or newer"
    suggestion: "Use Raspberry Pi 2 or newer (ARM32v7+) or ARM64 device"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 128
    reason: "Pi-hole requires at least 128MB RAM"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 256
    reason: "Pi-hole v6+ performs better with 256MB+ RAM"
    suggestion: "Consider increasing RAM for better performance and query logging"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 150
  timeout_seconds: 60
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for Pi-hole"
      suggestion: "Increase RAM allocation"

    - pattern: "shm.*shortage|/dev/shm.*full"
      reason: "Shared memory shortage"
      suggestion: "Increase shm_size in container configuration (default 256m)"

    - pattern: "address already in use.*:53"
      reason: "DNS port 53 already in use"
      suggestion: "Stop systemd-resolved or other DNS service using port 53"

    - pattern: "dnsmasq.*failed|SERVFAIL"
      reason: "DNS resolution failed"
      suggestion: "Check upstream DNS configuration"

    - pattern: "gravity.*failed|download.*error"
      reason: "Failed to update blocklists"
      suggestion: "Check internet connectivity and DNS upstream servers"
