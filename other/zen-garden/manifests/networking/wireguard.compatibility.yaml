# WireGuard Compatibility Rules
# GPL v2 licensed fast, modern VPN
# Multi-arch support: amd64, arm64, arm32v7
# No AVX/SSE requirements
# Requires kernel 5.6+ or WireGuard module
version: "1"

compatibility_rules:
  - name: "arm32v6-not-supported"
    condition:
      architectures: ["armv6l"]
    reason: "WireGuard Docker image requires ARMv7 or newer"
    suggestion: "Use Raspberry Pi 2 or newer (ARM32v7+) or ARM64 device"

  - name: "insufficient-memory"
    condition:
      memory_mb_less_than: 64
    reason: "WireGuard requires at least 64MB RAM"
    suggestion: "Increase stone memory allocation"

  - name: "low-memory-warning"
    condition:
      memory_mb_less_than: 128
    reason: "WireGuard with multiple peers benefits from 128MB+ RAM"
    suggestion: "Consider increasing RAM for many concurrent connections"
    warn_only: true

post_install_healthcheck:
  enabled: true
  scan_log_lines: 150
  timeout_seconds: 60
  patterns:
    - pattern: "Cannot allocate memory|OOM"
      reason: "Insufficient memory for WireGuard"
      suggestion: "Increase RAM allocation"

    - pattern: "module.*not found|wireguard.*not loaded"
      reason: "WireGuard kernel module not available"
      suggestion: "Upgrade to kernel 5.6+ or install WireGuard module on host"

    - pattern: "Operation not permitted|permission denied"
      reason: "Missing required capabilities"
      suggestion: "Ensure NET_ADMIN and SYS_MODULE capabilities are granted"

    - pattern: "address already in use"
      reason: "Port 51820 already in use"
      suggestion: "Stop conflicting service or change WireGuard port"

    - pattern: "iptables.*error|nftables.*failed"
      reason: "Firewall configuration error"
      suggestion: "Check iptables/nftables availability and permissions"
