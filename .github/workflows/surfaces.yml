# Surface-ledger tripwire (Epic E02).
#
# KOAN's general build/test CI is disabled by design (ci.yml / validate-main-pr.yml
# are noop placeholders; release-on-main.yml is build-only). This standalone, purpose-
# built workflow guards ONE thing: that docs/SURFACES.md exists and its table parses.
# It runs no build and no tests — it is the cheap tripwire the rotation contract
# requires, nothing more.
name: surfaces

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint surface ledger
        run: bash scripts/lint-surfaces.sh docs/SURFACES.md
