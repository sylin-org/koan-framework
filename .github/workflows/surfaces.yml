# Surface-ledger tripwire (Epic E02).
#
# This standalone, purpose-built workflow guards ONE thing: that docs/SURFACES.md exists and its
# table parses. Build/test and package proof are owned by pr-gate.yml and release-on-dev.yml.
# It runs no build and no tests — it is the cheap tripwire the rotation contract
# requires, nothing more.
name: surfaces

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint surface ledger
        run: bash scripts/lint-surfaces.sh docs/SURFACES.md
