name: Release packages from dev

on:
  push:
    branches: [dev]

# Every dev advancement remains a release event. Runs wait instead of using a cancelling concurrency
# group because dropping an intermediate event would discard package-version lineage.
permissions: {}

jobs:
  prepare_prior:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
    outputs:
      previous-source: ${{ steps.revisions.outputs.previous-source }}
      previous-lineage: ${{ steps.revisions.outputs.previous-lineage }}
      prior-state: ${{ steps.prior.outputs.state }}
      prior-needs-stage: ${{ steps.prior.outputs.needs-stage }}
      prior-needs-promote: ${{ steps.prior.outputs.needs-promote }}
    steps:
      - name: Checkout source event with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore repository tools
        run: dotnet tool restore

      - name: Wait for earlier dev release events
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $currentId = [long]$env:CURRENT_RUN_ID
          for ($attempt = 0; $attempt -lt 960; $attempt++) {
            $runs = @()
            for ($page = 1; $page -le 10; $page++) {
              $response = gh api "repos/$($env:REPOSITORY)/actions/workflows/release-on-dev.yml/runs?branch=dev&per_page=100&page=$page" | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { throw 'Unable to inspect the dev release queue.' }
              $runs += @($response.workflow_runs)
              if (@($response.workflow_runs).Count -lt 100) { break }
            }
            $current = $runs | Where-Object id -eq $currentId
            if (-not $current) { throw "Current workflow run $currentId was not returned by GitHub." }
            $earlier = @($runs | Where-Object {
              [long]$_.id -lt $currentId -and
              $_.status -in @('requested', 'queued', 'in_progress', 'waiting', 'pending')
            })
            if ($earlier.Count -eq 0) { exit 0 }
            Write-Host "Waiting for $($earlier.Count) earlier release event(s)."
            Start-Sleep -Seconds 15
          }
          throw 'Timed out after four hours waiting for the dev release queue.'

      - name: Resolve source and durable lineage
        id: revisions
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          $before = $env:EVENT_BEFORE
          if ($before -match '^0+$') { $before = "$($env:EVENT_AFTER)^" }
          git rev-parse --verify "$before^{commit}" *> $null
          if ($LASTEXITCODE -ne 0) {
            git fetch --no-tags --depth=1 origin $before
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch source predecessor $before." }
          }
          $before = (git rev-parse --verify "$before^{commit}").Trim()
          if ($LASTEXITCODE -ne 0) { throw 'Unable to resolve the source predecessor.' }
          "previous-source=$before" | Out-File $env:GITHUB_OUTPUT -Append

          $branch = 'automation/package-lineage-dev'
          $remoteRef = "refs/heads/$branch"
          $remote = @(git ls-remote --heads origin $remoteRef)
          if ($LASTEXITCODE -ne 0) { throw "Unable to inspect $remoteRef." }
          if ($remote.Count -gt 0) {
            git fetch --no-tags origin "$($remoteRef):refs/remotes/origin/$branch"
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch $remoteRef." }
            $previousLineage = (git rev-parse --verify "refs/remotes/origin/$branch^{commit}").Trim()
            "previous-lineage=$previousLineage" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host "Previous version lineage: $previousLineage"
          }
          else {
            "previous-lineage=" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host 'No prior version lineage; this event will initialize it.'
          }

      - name: Build recovery compiler
        shell: pwsh
        run: |
          dotnet build tools/Koan.Packaging/Koan.Packaging.csproj -c Release --nologo -p:NuGetAuditMode=all -p:NuGetAuditLevel=high -p:WarningsAsErrors=NU1903%3BNU1904
          if ($LASTEXITCODE -ne 0) { throw 'Release compiler build failed.' }
          dotnet publish tools/Koan.Packaging/Koan.Packaging.csproj -c Release --no-build --nologo -o artifacts/prior/tool
          if ($LASTEXITCODE -ne 0) { throw 'Release compiler handoff failed.' }

      - name: Inspect and prepare prior release wave
        id: prior
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PREVIOUS_LINEAGE: ${{ steps.revisions.outputs.previous-lineage }}
        run: |
          New-Item -ItemType Directory -Force artifacts/prior | Out-Null
          $tool = (Resolve-Path 'artifacts/prior/tool/Koan.Packaging.dll').Path
          $inspectionPath = (Join-Path (Resolve-Path 'artifacts/prior').Path 'prior-inspection.json')
          $needsStage = $false
          $needsPromote = $false
          $releaseCount = 0

          if ([string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) {
            $inspection = [pscustomobject]@{ state = 'none'; versionCommit = $null }
            $inspection | ConvertTo-Json | Out-File $inspectionPath -Encoding utf8
          }
          else {
            & dotnet $tool wave-inspect `
              --version-commit $env:PREVIOUS_LINEAGE `
              --output $inspectionPath
            if ($LASTEXITCODE -ne 0) { throw 'Prior release-wave inspection failed.' }
            $inspection = Get-Content $inspectionPath -Raw | ConvertFrom-Json

            if ($inspection.state -eq 'prepared') {
              $needsPromote = $true
            }
            elseif ($inspection.state -in @('missing', 'staging')) {
              git switch --detach $env:PREVIOUS_LINEAGE
              if ($LASTEXITCODE -ne 0) { throw "Unable to check out prior version commit $($env:PREVIOUS_LINEAGE)." }

              & dotnet $tool materialize-lineage `
                --version-commit $env:PREVIOUS_LINEAGE `
                --output artifacts/prior/release-lineage.json
              if ($LASTEXITCODE -ne 0) { throw 'Prior committed lineage materialization failed.' }

              $priorLineage = Get-Content artifacts/prior/release-lineage.json -Raw | ConvertFrom-Json
              & dotnet $tool plan `
                --lineage artifacts/prior/release-lineage.json `
                --output artifacts/prior/release-set.json
              if ($LASTEXITCODE -ne 0) { throw 'Prior release planning failed.' }
              $manifest = Get-Content artifacts/prior/release-set.json -Raw | ConvertFrom-Json
              $releaseCount = @($manifest.packages).Count

              if ($releaseCount -gt 0) {
                ./scripts/green-ratchet.ps1 `
                  -Configuration Release `
                  -Base $priorLineage.previousSourceCommit `
                  -PublicRelease
                if ($LASTEXITCODE -ne 0) { throw 'Exact historical release ratchet failed.' }
                $drift = @(git status --porcelain --untracked-files=no)
                if ($drift.Count -gt 0) {
                  throw "The historical version checkout drifted during recovery proof:`n$($drift -join "`n")"
                }

                & dotnet $tool pack `
                  --manifest artifacts/prior/release-set.json `
                  --output artifacts/prior/packages `
                  --clean-room
                if ($LASTEXITCODE -ne 0) { throw 'Prior package recovery proof failed.' }

                & dotnet $tool wave-bundle `
                  --manifest artifacts/prior/release-set.json `
                  --lineage artifacts/prior/release-lineage.json `
                  --artifacts artifacts/prior/packages `
                  --evidence artifacts/prior `
                  --output artifacts/prior
                if ($LASTEXITCODE -ne 0) { throw 'Prior release-wave preparation failed.' }
                $needsStage = $true
                $needsPromote = $true
              }
            }
            elseif ($inspection.state -ne 'published') {
              throw "Unsupported prior release-wave state '$($inspection.state)'."
            }
          }

          "state=$($inspection.state)" | Out-File $env:GITHUB_OUTPUT -Append
          "needs-stage=$($needsStage.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append
          "needs-promote=$($needsPromote.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Preserve prior recovery handoff
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: koan-prior-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/prior/tool
            artifacts/prior/prior-inspection.json
            artifacts/prior/release-wave.json
            artifacts/prior/release-wave-*.zip
          if-no-files-found: error
          retention-days: 90

  stage_prior:
    needs: prepare_prior
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    steps:
      - name: Setup exact promotion runtime
        if: needs.prepare_prior.outputs.prior-needs-stage == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.110

      - name: Restore prior recovery handoff
        if: needs.prepare_prior.outputs.prior-needs-stage == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: koan-prior-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/prior

      - name: Stage exact prior release wave
        if: needs.prepare_prior.outputs.prior-needs-stage == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $tool = (Resolve-Path 'artifacts/prior/tool/Koan.Packaging.dll').Path
          $marker = (Resolve-Path 'artifacts/prior/release-wave.json').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-stage-prior-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize prior staging workspace.' }
          Push-Location $scratch
          try {
            & dotnet $tool wave-stage `
              --marker $marker `
              --output (Join-Path $scratch 'stage-result.json')
            if ($LASTEXITCODE -ne 0) { throw 'Prior release-wave staging failed.' }
          }
          finally {
            Pop-Location
          }

  promote_prior:
    needs:
      - prepare_prior
      - stage_prior
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      actions: read
      contents: write
    steps:
      - name: Setup exact promotion runtime
        if: needs.prepare_prior.outputs.prior-needs-promote == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.110

      - name: Restore prior recovery handoff
        if: needs.prepare_prior.outputs.prior-needs-promote == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: koan-prior-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/prior

      - name: Require prepared prior escrow before promotion
        if: needs.prepare_prior.outputs.prior-needs-promote == 'true'
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION_COMMIT: ${{ needs.prepare_prior.outputs.previous-lineage }}
        run: |
          $tool = (Resolve-Path 'artifacts/prior/tool/Koan.Packaging.dll').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-inspect-prior-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize prior inspection workspace.' }
          $inspectionPath = Join-Path $scratch 'promotion-inspection.json'
          Push-Location $scratch
          try {
            & dotnet $tool wave-inspect `
              --version-commit $env:VERSION_COMMIT `
              --output $inspectionPath
            if ($LASTEXITCODE -ne 0) { throw 'Prior pre-promotion inspection failed.' }
          }
          finally {
            Pop-Location
          }
          $inspection = Get-Content $inspectionPath -Raw | ConvertFrom-Json
          if ($inspection.state -eq 'prepared') {
            'needs-promotion=true' | Out-File $env:GITHUB_OUTPUT -Append
          }
          elseif ($inspection.state -eq 'published') {
            'needs-promotion=false' | Out-File $env:GITHUB_OUTPUT -Append
          }
          else {
            throw "Prior release wave must be prepared before promotion; found '$($inspection.state)'."
          }

      - name: Promote exact prior release wave
        if: steps.gate.outputs.needs-promotion == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          VERSION_COMMIT: ${{ needs.prepare_prior.outputs.previous-lineage }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Repository secret NUGET_API_KEY is required for NuGet promotion.'
          }
          $tool = (Resolve-Path 'artifacts/prior/tool/Koan.Packaging.dll').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-promote-prior-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize prior promotion workspace.' }
          Push-Location $scratch
          try {
            & dotnet $tool wave-promote `
              --version-commit $env:VERSION_COMMIT `
              --output (Join-Path $scratch 'promotion-result.json')
            if ($LASTEXITCODE -ne 0) { throw 'Prior release-wave promotion failed.' }
          }
          finally {
            Pop-Location
          }

  prove_current:
    needs:
      - prepare_prior
      - promote_prior
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
    outputs:
      version-commit: ${{ steps.lineage.outputs.version-commit }}
      current-state: ${{ steps.current.outputs.state }}
      has-packages: ${{ steps.disposition.outputs.has-packages }}
      needs-stage: ${{ steps.disposition.outputs.needs-stage }}
      needs-promote: ${{ steps.disposition.outputs.needs-promote }}
      release-count: ${{ steps.disposition.outputs.release-count }}
      closure-count: ${{ steps.lineage.outputs.closure-count }}
      marker-count: ${{ steps.lineage.outputs.marker-count }}
    steps:
      - name: Checkout current source event with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore repository tools
        run: dotnet tool restore

      - name: Build current release compiler
        shell: pwsh
        run: |
          dotnet build tools/Koan.Packaging/Koan.Packaging.csproj -c Release --nologo -p:NuGetAuditMode=all -p:NuGetAuditLevel=high -p:WarningsAsErrors=NU1903%3BNU1904
          if ($LASTEXITCODE -ne 0) { throw 'Release compiler build failed.' }
          dotnet publish tools/Koan.Packaging/Koan.Packaging.csproj -c Release --no-build --nologo -o artifacts/current/tool
          if ($LASTEXITCODE -ne 0) { throw 'Release compiler handoff failed.' }

      - name: Resolve exact prior lineage input
        shell: pwsh
        env:
          PREVIOUS_LINEAGE: ${{ needs.prepare_prior.outputs.previous-lineage }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) { exit 0 }
          $remoteRef = 'refs/heads/automation/package-lineage-dev'
          git fetch --no-tags origin "$($remoteRef):refs/remotes/origin/automation/package-lineage-dev"
          if ($LASTEXITCODE -ne 0) { throw 'Unable to fetch the exact prior package lineage.' }
          $actual = (git rev-parse --verify 'refs/remotes/origin/automation/package-lineage-dev^{commit}').Trim()
          if ($actual -ne $env:PREVIOUS_LINEAGE) {
            throw "Package lineage advanced from $($env:PREVIOUS_LINEAGE) to $actual before current proof."
          }

      - name: Compile current package lineage
        id: lineage
        shell: pwsh
        env:
          SOURCE_COMMIT: ${{ github.sha }}
          PREVIOUS_SOURCE: ${{ needs.prepare_prior.outputs.previous-source }}
          PREVIOUS_LINEAGE: ${{ needs.prepare_prior.outputs.previous-lineage }}
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          $lineageBase = if ([string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) {
            $env:SOURCE_COMMIT
          }
          else {
            $env:PREVIOUS_SOURCE
          }
          $arguments = @(
            $tool,
            'lineage',
            '--source', $env:SOURCE_COMMIT,
            '--previous-source', $lineageBase,
            '--branch', 'automation/package-lineage-dev',
            '--output', 'artifacts/current/release-lineage.json'
          )
          if (-not [string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) {
            $arguments += @('--previous-lineage', $env:PREVIOUS_LINEAGE)
          }
          & dotnet @arguments
          if ($LASTEXITCODE -ne 0) { throw 'Current package lineage compilation failed.' }

          $lineage = Get-Content artifacts/current/release-lineage.json -Raw | ConvertFrom-Json
          "version-commit=$($lineage.versionCommit)" | Out-File $env:GITHUB_OUTPUT -Append
          "closure-count=$(@($lineage.closurePackages).Count)" | Out-File $env:GITHUB_OUTPUT -Append
          "marker-count=$(@($lineage.markerPackages).Count)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Inspect compiled current release wave
        id: current
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION_COMMIT: ${{ steps.lineage.outputs.version-commit }}
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          & dotnet $tool wave-inspect `
            --version-commit $env:VERSION_COMMIT `
            --output artifacts/current/current-inspection.json
          if ($LASTEXITCODE -ne 0) { throw 'Current release-wave inspection failed.' }
          $inspection = Get-Content artifacts/current/current-inspection.json -Raw | ConvertFrom-Json
          if ($inspection.state -notin @('missing', 'staging', 'prepared', 'published')) {
            throw "Unsupported current release-wave state '$($inspection.state)'."
          }
          $needsPlan = $inspection.state -in @('missing', 'staging')
          "state=$($inspection.state)" | Out-File $env:GITHUB_OUTPUT -Append
          "needs-plan=$($needsPlan.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Compile exact current release plan
        id: plan
        if: steps.current.outputs.needs-plan == 'true'
        shell: pwsh
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          & dotnet $tool plan `
            --lineage artifacts/current/release-lineage.json `
            --output artifacts/current/release-set.json
          if ($LASTEXITCODE -ne 0) { throw 'Current release planning failed.' }
          $manifest = Get-Content artifacts/current/release-set.json -Raw | ConvertFrom-Json
          $releaseCount = @($manifest.packages).Count
          $hasPackages = if ($releaseCount -gt 0) { 'true' } else { 'false' }
          "has-packages=$hasPackages" | Out-File $env:GITHUB_OUTPUT -Append
          "release-count=$releaseCount" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Prove exact current version commit
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        env:
          VERSION_COMMIT: ${{ steps.lineage.outputs.version-commit }}
        run: |
          $lineage = Get-Content artifacts/current/release-lineage.json -Raw | ConvertFrom-Json
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne $env:VERSION_COMMIT) {
            throw "Checkout $head does not match compiled version commit $($env:VERSION_COMMIT)."
          }
          ./scripts/green-ratchet.ps1 -Configuration Release -Base $lineage.previousSourceCommit -PublicRelease
          if ($LASTEXITCODE -ne 0) { throw 'Exact current release ratchet failed.' }
          $drift = @(git status --porcelain --untracked-files=no)
          if ($drift.Count -gt 0) {
            throw "The exact version checkout drifted during verification:`n$($drift -join "`n")"
          }

      - name: Pack and prove current package closure
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          & dotnet $tool pack `
            --manifest artifacts/current/release-set.json `
            --output artifacts/current/packages `
            --clean-room
          if ($LASTEXITCODE -ne 0) { throw 'Current package verification failed.' }

      - name: Prepare exact current release-wave escrow
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          & dotnet $tool wave-bundle `
            --manifest artifacts/current/release-set.json `
            --lineage artifacts/current/release-lineage.json `
            --artifacts artifacts/current/packages `
            --evidence artifacts/current `
            --output artifacts/current
          if ($LASTEXITCODE -ne 0) { throw 'Current release-wave preparation failed.' }

      - name: Resolve current release disposition
        id: disposition
        shell: pwsh
        env:
          CURRENT_STATE: ${{ steps.current.outputs.state }}
        run: |
          $releaseCount = 0
          $hasPackages = $false
          $needsStage = $false
          $needsPromote = $false
          if ($env:CURRENT_STATE -eq 'published') {
            $hasPackages = $true
          }
          elseif ($env:CURRENT_STATE -eq 'prepared') {
            $hasPackages = $true
            $needsPromote = $true
          }
          elseif ($env:CURRENT_STATE -in @('missing', 'staging')) {
            $manifest = Get-Content artifacts/current/release-set.json -Raw | ConvertFrom-Json
            $releaseCount = @($manifest.packages).Count
            $hasPackages = $releaseCount -gt 0
            $needsStage = $hasPackages
            $needsPromote = $hasPackages
          }
          else {
            throw "Unsupported current release disposition '$($env:CURRENT_STATE)'."
          }
          "has-packages=$($hasPackages.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append
          "needs-stage=$($needsStage.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append
          "needs-promote=$($needsPromote.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_OUTPUT -Append
          "release-count=$releaseCount" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Bundle exact current lineage candidate
        shell: pwsh
        run: |
          git bundle create artifacts/current/package-lineage.bundle refs/heads/automation/package-lineage-dev
          if ($LASTEXITCODE -ne 0) { throw 'Unable to preserve the exact current lineage candidate.' }

      - name: Preserve exact current release handoff
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: koan-current-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/current/tool
            artifacts/current/release-lineage.json
            artifacts/current/package-lineage.bundle
            artifacts/current/release-wave.json
            artifacts/current/release-wave-*.zip
          if-no-files-found: error
          retention-days: 90

      - name: Summarize current release impact
        if: always() && steps.lineage.outcome == 'success'
        shell: pwsh
        run: |
          $lineage = Get-Content artifacts/current/release-lineage.json -Raw | ConvertFrom-Json
          $lines = @(
            '# Koan package release impact'
            ''
            "Source: ``$($lineage.sourceCommit)``"
            ''
            "Version commit: ``$($lineage.versionCommit)``"
            ''
            "Breaking closure: $(@($lineage.closurePackages).Count) package(s); generated markers: $(@($lineage.markerPackages).Count)."
          )
          if (Test-Path artifacts/current/release-set.json) {
            $manifest = Get-Content artifacts/current/release-set.json -Raw | ConvertFrom-Json
            $rows = @($manifest.packages | ForEach-Object { "| $($_.packageId) | $($_.previousVersion) | $($_.version) | $($_.reason) |" })
            $lines += @(
              ''
              '| Package | Previous | Version | Reason |'
              '| --- | --- | --- | --- |'
              $rows
            )
          }
          $lines | Out-File $env:GITHUB_STEP_SUMMARY -Append

  stage_current:
    needs:
      - prepare_prior
      - prove_current
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: write
    steps:
      - name: Setup exact staging runtime
        if: needs.prove_current.outputs.needs-stage == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.110

      - name: Restore exact current release handoff
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: koan-current-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/current

      - name: Persist exact version lineage
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
          PREVIOUS_SOURCE: ${{ needs.prepare_prior.outputs.previous-source }}
          PREVIOUS_LINEAGE: ${{ needs.prepare_prior.outputs.previous-lineage }}
          VERSION_COMMIT: ${{ needs.prove_current.outputs.version-commit }}
        run: |
          $lineagePath = (Resolve-Path 'artifacts/current/release-lineage.json').Path
          $bundlePath = (Resolve-Path 'artifacts/current/package-lineage.bundle').Path
          $lineage = Get-Content $lineagePath -Raw | ConvertFrom-Json
          if ($lineage.sourceCommit -ne $env:SOURCE_COMMIT -or $lineage.versionCommit -ne $env:VERSION_COMMIT) {
            throw 'Current lineage handoff does not match the exact source/version job outputs.'
          }
          if ([string]::IsNullOrWhiteSpace($lineage.previousVersionCommit)) {
            throw 'Current lineage handoff has no recorded previous version commit.'
          }

          $repository = Join-Path $env:RUNNER_TEMP "koan-lineage-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $repository
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize lineage persistence workspace.' }
          git -C $repository bundle verify $bundlePath
          if ($LASTEXITCODE -ne 0) { throw 'Current lineage bundle verification failed.' }
          git -C $repository fetch $bundlePath 'refs/heads/automation/package-lineage-dev:refs/remotes/handoff/lineage'
          if ($LASTEXITCODE -ne 0) { throw 'Unable to import the current lineage handoff.' }
          $candidate = (git -C $repository rev-parse 'refs/remotes/handoff/lineage^{commit}').Trim()
          $parents = @(git -C $repository rev-list --parents -n 1 $candidate) -split '\s+'
          if ($candidate -ne $env:VERSION_COMMIT -or $parents.Count -ne 2 -or $parents[1] -ne $lineage.previousVersionCommit) {
            throw 'Current lineage bundle does not preserve the exact single-parent candidate.'
          }

          gh auth setup-git
          if ($LASTEXITCODE -ne 0) { throw 'Unable to configure GitHub authentication for lineage persistence.' }
          $origin = "https://github.com/$($env:REPOSITORY).git"
          git -C $repository remote add origin $origin
          $remoteRef = 'refs/heads/automation/package-lineage-dev'
          $remote = @(git -C $repository ls-remote --heads origin $remoteRef)
          if ($LASTEXITCODE -ne 0) { throw 'Unable to inspect the durable lineage branch before persistence.' }
          if ($remote.Count -gt 1) { throw 'Durable package lineage resolved to more than one branch head.' }
          $remoteHead = if ($remote.Count -eq 1) { ($remote[0] -split '\s+')[0] } else { $null }

          if ($remoteHead -eq $env:VERSION_COMMIT) {
            Write-Host 'Exact version lineage is already persisted; replay is a no-op.'
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) {
            if ($null -ne $remoteHead) { throw 'Package lineage was initialized concurrently; refusing to overwrite it.' }
          }
          else {
            if ($remoteHead -ne $env:PREVIOUS_LINEAGE) {
              throw 'Package lineage advanced before the exact current candidate could be persisted.'
            }
          }

          git -C $repository push origin "$($env:VERSION_COMMIT):$remoteRef"
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to persist exact package version lineage; no current wave was staged.'
          }

      - name: Stage exact current release wave
        if: needs.prove_current.outputs.needs-stage == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          $marker = (Resolve-Path 'artifacts/current/release-wave.json').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-stage-current-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize current staging workspace.' }
          Push-Location $scratch
          try {
            & dotnet $tool wave-stage `
              --marker $marker `
              --output (Join-Path $scratch 'stage-result.json')
            if ($LASTEXITCODE -ne 0) { throw 'Current release-wave staging failed.' }
          }
          finally {
            Pop-Location
          }

  promote_current:
    needs:
      - prove_current
      - stage_current
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      actions: read
      contents: write
    steps:
      - name: Setup exact promotion runtime
        if: needs.prove_current.outputs.needs-promote == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.110

      - name: Restore current release coordinator
        if: needs.prove_current.outputs.needs-promote == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: koan-current-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/current

      - name: Require prepared current escrow before promotion
        if: needs.prove_current.outputs.needs-promote == 'true'
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION_COMMIT: ${{ needs.prove_current.outputs.version-commit }}
        run: |
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-inspect-current-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize current inspection workspace.' }
          $inspectionPath = Join-Path $scratch 'promotion-inspection.json'
          Push-Location $scratch
          try {
            & dotnet $tool wave-inspect `
              --version-commit $env:VERSION_COMMIT `
              --output $inspectionPath
            if ($LASTEXITCODE -ne 0) { throw 'Current pre-promotion inspection failed.' }
          }
          finally {
            Pop-Location
          }
          $inspection = Get-Content $inspectionPath -Raw | ConvertFrom-Json
          if ($inspection.state -eq 'prepared') {
            'needs-promotion=true' | Out-File $env:GITHUB_OUTPUT -Append
          }
          elseif ($inspection.state -eq 'published') {
            'needs-promotion=false' | Out-File $env:GITHUB_OUTPUT -Append
          }
          else {
            throw "Current release wave must be prepared before promotion; found '$($inspection.state)'."
          }

      - name: Promote exact current release wave
        if: steps.gate.outputs.needs-promotion == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          VERSION_COMMIT: ${{ needs.prove_current.outputs.version-commit }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Repository secret NUGET_API_KEY is required for NuGet promotion.'
          }
          $tool = (Resolve-Path 'artifacts/current/tool/Koan.Packaging.dll').Path
          $scratch = Join-Path $env:RUNNER_TEMP "koan-promote-current-$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)"
          git init $scratch
          if ($LASTEXITCODE -ne 0) { throw 'Unable to initialize current promotion workspace.' }
          Push-Location $scratch
          try {
            & dotnet $tool wave-promote `
              --version-commit $env:VERSION_COMMIT `
              --output (Join-Path $scratch 'promotion-result.json')
            if ($LASTEXITCODE -ne 0) { throw 'Current release-wave promotion failed.' }
          }
          finally {
            Pop-Location
          }
