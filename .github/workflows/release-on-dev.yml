name: Release packages from dev

on:
  push:
    branches: [dev]

# Every push remains its own release event. Publication is serialized by the lease step below;
# GitHub concurrency groups are intentionally not used because they discard older pending runs.
permissions: {}

jobs:
  build-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      has-packages: ${{ steps.plan.outputs.has-packages }}
    steps:
      - name: Checkout release commit with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Build release source
        shell: pwsh
        run: |
          dotnet build Koan.sln -c Release --nologo -p:PublicRelease=true -p:NuGetAuditMode=all -p:NuGetAuditLevel=high -p:WarningsAsErrors=NU1903%3BNU1904
          if ($LASTEXITCODE -ne 0) { throw 'Release build failed.' }

      - name: Test release source
        shell: pwsh
        run: |
          dotnet test Koan.sln -c Release --no-build --nologo --blame-hang --blame-hang-timeout 5m
          if ($LASTEXITCODE -ne 0) { throw 'Release tests failed.' }

      - name: Compile release plan
        id: plan
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          $before = $env:EVENT_BEFORE
          if ($before -match '^0+$') { $before = "$($env:EVENT_AFTER)^" }
          git rev-parse --verify "$before^{commit}" *> $null
          if ($LASTEXITCODE -ne 0) {
            git fetch --no-tags --depth=1 origin $before
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch release event predecessor $before." }
          }
          dotnet run --project tools/Koan.Packaging -c Release --no-build -- plan `
            --before $before `
            --after $env:EVENT_AFTER `
            --output artifacts/release/release-set.json
          if ($LASTEXITCODE -ne 0) { throw 'Release planning failed.' }
          $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
          $newCount = @($manifest.packages | Where-Object { -not $_.alreadyPublished }).Count
          $hasPackages = if ($newCount -gt 0) { 'true' } else { 'false' }
          "has-packages=$hasPackages" | Out-File $env:GITHUB_OUTPUT -Append
          "new-count=$newCount" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Pack and prove package closure
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        run: |
          dotnet run --project tools/Koan.Packaging -c Release --no-build -- pack `
            --manifest artifacts/release/release-set.json `
            --output artifacts/release/packages `
            --clean-room
          if ($LASTEXITCODE -ne 0) { throw 'Package verification failed.' }

      - name: Upload exact verified release set
        if: steps.plan.outputs.has-packages == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: koan-release-${{ github.sha }}
          path: artifacts/release
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        shell: pwsh
        run: |
          $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
          $rows = @($manifest.packages | ForEach-Object { "| $($_.packageId) | $($_.previousVersion) | $($_.version) | $($_.reason) |" })
          @(
            '# Koan package release impact'
            ''
            "Source: ``$($manifest.sourceCommit)``"
            ''
            '| Package | Previous | Minted | Reason |'
            '| --- | --- | --- | --- |'
            $rows
          ) | Out-File $env:GITHUB_STEP_SUMMARY -Append

  publish:
    needs: build-verify
    if: needs.build-verify.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Download verified release set
        uses: actions/download-artifact@v4
        with:
          name: koan-release-${{ github.sha }}
          path: artifacts/release

      - name: Wait for earlier dev release events
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $currentId = [long]$env:CURRENT_RUN_ID
          for ($attempt = 0; $attempt -lt 960; $attempt++) {
            $runs = @()
            for ($page = 1; $page -le 10; $page++) {
              $response = gh api "repos/$($env:REPOSITORY)/actions/workflows/release-on-dev.yml/runs?branch=dev&per_page=100&page=$page" | ConvertFrom-Json
              $runs += @($response.workflow_runs)
              if (@($response.workflow_runs).Count -lt 100) { break }
            }
            $current = $runs | Where-Object id -eq $currentId
            if (-not $current) { throw "Current workflow run $currentId was not returned by GitHub." }
            $earlier = @($runs | Where-Object {
              [long]$_.id -lt $currentId -and
              $_.status -in @('queued', 'in_progress', 'waiting', 'pending')
            })
            if ($earlier.Count -eq 0) { exit 0 }
            Write-Host "Waiting for $($earlier.Count) earlier release event(s)."
            Start-Sleep -Seconds 15
          }
          throw 'Timed out after four hours waiting for the dev release queue.'

      - name: Require trusted-publishing identity
        shell: pwsh
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_USER)) {
            throw 'Repository variable NUGET_USER must name the nuget.org trusted-publishing owner.'
          }

      - name: Exchange GitHub identity for a short-lived NuGet credential
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish and reconcile exact artifacts
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet run --project tools/Koan.Packaging -c Release -- publish `
            --manifest artifacts/release/release-set.json `
            --artifacts artifacts/release/packages `
            --state artifacts/release/release-state.json
          if ($LASTEXITCODE -ne 0) { throw 'Package publication did not converge.' }

      - name: Record completed release set
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $short = '${{ github.sha }}'.Substring(0, 12)
          $tag = "release/dev/$short"
          $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
          $notes = @(
            "Automated package release from ``dev`` at ``${{ github.sha }}``."
            ''
            "Published $(@($manifest.packages | Where-Object { -not $_.alreadyPublished }).Count) independently versioned package(s)."
          ) -join "`n"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release upload $tag artifacts/release/release-set.json artifacts/release/release-state.json --clobber
              if ($LASTEXITCODE -eq 0) {
                gh release edit $tag --title "Koan package release $short" --notes $notes
              }
            }
            else {
              gh release create $tag artifacts/release/release-set.json artifacts/release/release-state.json `
                --target '${{ github.sha }}' `
                --title "Koan package release $short" `
                --notes $notes
            }
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($attempt -eq 5) { throw "Failed to record release evidence after $attempt attempts." }
            Start-Sleep -Seconds ([Math]::Pow(2, $attempt))
          }
