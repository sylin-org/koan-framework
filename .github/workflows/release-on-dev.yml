name: Release packages from dev

on:
  push:
    branches: [dev]

# Every dev advancement remains a release event. Runs wait instead of using a cancelling concurrency
# group because dropping an intermediate event would discard package-version lineage.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - name: Checkout source event with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore repository tools
        run: dotnet tool restore

      - name: Wait for earlier dev release events
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $currentId = [long]$env:CURRENT_RUN_ID
          for ($attempt = 0; $attempt -lt 960; $attempt++) {
            $runs = @()
            for ($page = 1; $page -le 10; $page++) {
              $response = gh api "repos/$($env:REPOSITORY)/actions/workflows/release-on-dev.yml/runs?branch=dev&per_page=100&page=$page" | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { throw 'Unable to inspect the dev release queue.' }
              $runs += @($response.workflow_runs)
              if (@($response.workflow_runs).Count -lt 100) { break }
            }
            $current = $runs | Where-Object id -eq $currentId
            if (-not $current) { throw "Current workflow run $currentId was not returned by GitHub." }
            $earlier = @($runs | Where-Object {
              [long]$_.id -lt $currentId -and
              $_.status -in @('requested', 'queued', 'in_progress', 'waiting', 'pending')
            })
            if ($earlier.Count -eq 0) { exit 0 }
            Write-Host "Waiting for $($earlier.Count) earlier release event(s)."
            Start-Sleep -Seconds 15
          }
          throw 'Timed out after four hours waiting for the dev release queue.'

      - name: Resolve source and durable lineage
        id: revisions
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          $before = $env:EVENT_BEFORE
          if ($before -match '^0+$') { $before = "$($env:EVENT_AFTER)^" }
          git rev-parse --verify "$before^{commit}" *> $null
          if ($LASTEXITCODE -ne 0) {
            git fetch --no-tags --depth=1 origin $before
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch source predecessor $before." }
          }
          $before = (git rev-parse --verify "$before^{commit}").Trim()
          if ($LASTEXITCODE -ne 0) { throw 'Unable to resolve the source predecessor.' }
          "previous-source=$before" | Out-File $env:GITHUB_OUTPUT -Append

          $branch = 'automation/package-lineage-dev'
          $remoteRef = "refs/heads/$branch"
          $remote = @(git ls-remote --heads origin $remoteRef)
          if ($LASTEXITCODE -ne 0) { throw "Unable to inspect $remoteRef." }
          if ($remote.Count -gt 0) {
            git fetch --no-tags origin "$($remoteRef):refs/remotes/origin/$branch"
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch $remoteRef." }
            $previousLineage = (git rev-parse --verify "refs/remotes/origin/$branch^{commit}").Trim()
            "previous-lineage=$previousLineage" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host "Previous version lineage: $previousLineage"
          }
          else {
            "previous-lineage=" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host 'No prior version lineage; this event will initialize it.'
          }

      - name: Build release compiler
        shell: pwsh
        run: |
          dotnet build tools/Koan.Packaging/Koan.Packaging.csproj -c Release --nologo -p:NuGetAuditMode=all -p:NuGetAuditLevel=high -p:WarningsAsErrors=NU1903%3BNU1904
          if ($LASTEXITCODE -ne 0) { throw 'Release compiler build failed.' }

      - name: Compile durable package lineage
        id: lineage
        shell: pwsh
        env:
          SOURCE_COMMIT: ${{ github.sha }}
          PREVIOUS_SOURCE: ${{ steps.revisions.outputs.previous-source }}
          PREVIOUS_LINEAGE: ${{ steps.revisions.outputs.previous-lineage }}
        run: |
          $arguments = @(
            'run', '--project', 'tools/Koan.Packaging', '-c', 'Release', '--no-build', '--',
            'lineage',
            '--source', $env:SOURCE_COMMIT,
            '--previous-source', $env:PREVIOUS_SOURCE,
            '--branch', 'automation/package-lineage-dev',
            '--output', 'artifacts/release/release-lineage.json'
          )
          if (-not [string]::IsNullOrWhiteSpace($env:PREVIOUS_LINEAGE)) {
            $arguments += @('--previous-lineage', $env:PREVIOUS_LINEAGE)
          }
          & dotnet @arguments
          if ($LASTEXITCODE -ne 0) { throw 'Package lineage compilation failed.' }
          $lineage = Get-Content artifacts/release/release-lineage.json -Raw | ConvertFrom-Json
          "version-commit=$($lineage.versionCommit)" | Out-File $env:GITHUB_OUTPUT -Append
          "closure-count=$(@($lineage.closurePackages).Count)" | Out-File $env:GITHUB_OUTPUT -Append
          "marker-count=$(@($lineage.markerPackages).Count)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Persist exact version lineage
        shell: pwsh
        run: |
          git push origin 'HEAD:refs/heads/automation/package-lineage-dev'
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to persist package version lineage. A concurrent or non-forward update must be reconciled before publication.'
          }

      - name: Validate exact version commit
        shell: pwsh
        run: |
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne '${{ steps.lineage.outputs.version-commit }}') {
            throw "Checkout $head does not match compiled version commit ${{ steps.lineage.outputs.version-commit }}."
          }
          ./scripts/green-ratchet.ps1 -Configuration Release -Base '${{ steps.revisions.outputs.previous-source }}' -PublicRelease
          if ($LASTEXITCODE -ne 0) { throw 'Exact release ratchet failed.' }
          $drift = @(git status --porcelain --untracked-files=no)
          if ($drift.Count -gt 0) {
            throw "The exact version checkout drifted during verification:`n$($drift -join "`n")"
          }

      - name: Compile exact release plan
        id: plan
        shell: pwsh
        run: |
          dotnet run --project tools/Koan.Packaging -c Release --no-build -- plan `
            --lineage artifacts/release/release-lineage.json `
            --output artifacts/release/release-set.json
          if ($LASTEXITCODE -ne 0) { throw 'Release planning failed.' }
          $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
          $releaseCount = @($manifest.packages).Count
          $hasPackages = if ($releaseCount -gt 0) { 'true' } else { 'false' }
          "has-packages=$hasPackages" | Out-File $env:GITHUB_OUTPUT -Append
          "release-count=$releaseCount" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Pack and prove package closure
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        run: |
          dotnet run --project tools/Koan.Packaging -c Release --no-build -- pack `
            --manifest artifacts/release/release-set.json `
            --output artifacts/release/packages `
            --clean-room
          if ($LASTEXITCODE -ne 0) { throw 'Package verification failed.' }

      - name: Preserve exact verified release set
        if: steps.plan.outputs.has-packages == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: koan-release-${{ steps.lineage.outputs.version-commit }}
          path: artifacts/release
          if-no-files-found: error
          retention-days: 30
          overwrite: true

      - name: Require trusted-publishing identity
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_USER)) {
            throw 'Repository variable NUGET_USER must name the nuget.org trusted-publishing owner.'
          }

      - name: Exchange GitHub identity for a short-lived NuGet credential
        if: steps.plan.outputs.has-packages == 'true'
        id: nuget-login
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e # v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish and reconcile exact artifacts
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet run --project tools/Koan.Packaging -c Release --no-build -- publish `
            --manifest artifacts/release/release-set.json `
            --artifacts artifacts/release/packages `
            --state artifacts/release/release-state.json
          if ($LASTEXITCODE -ne 0) { throw 'Package publication did not converge.' }

      - name: Record completed release set
        if: steps.plan.outputs.has-packages == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
          $sourceShort = $manifest.sourceCommit.Substring(0, 12)
          $versionShort = $manifest.versionCommit.Substring(0, 12)
          $tag = "release/dev/$sourceShort"
          $notes = @(
            "Automated package release from ``dev`` source ``$($manifest.sourceCommit)``."
            ''
            "Exact version commit: ``$($manifest.versionCommit)``."
            ''
            "Reconciled $(@($manifest.packages).Count) independently versioned package(s)."
          ) -join "`n"
          $evidence = @(
            'artifacts/release/release-lineage.json',
            'artifacts/release/release-set.json',
            'artifacts/release/release-state.json'
          )
          $tagRef = "refs/tags/$tag"
          function Resolve-RemoteTagTarget {
            $refs = @(git ls-remote --tags origin $tagRef "$tagRef^{}")
            if ($LASTEXITCODE -ne 0) { throw "Unable to inspect release tag $tag." }
            if ($refs.Count -eq 0) { return $null }
            $peeled = $refs | Where-Object { $_ -like "*$tagRef^{}" } | Select-Object -First 1
            $selected = if ($peeled) { $peeled } else { $refs | Select-Object -First 1 }
            return ($selected -split '\s+')[0]
          }
          $tagTarget = Resolve-RemoteTagTarget
          if ($tagTarget) {
            if ($tagTarget -ne $manifest.versionCommit) {
              throw "Release tag $tag targets $tagTarget, not exact version commit $($manifest.versionCommit)."
            }
          }
          else {
            git push origin "$($manifest.versionCommit):$tagRef"
            if ($LASTEXITCODE -ne 0) {
              $tagTarget = Resolve-RemoteTagTarget
              if ($tagTarget -ne $manifest.versionCommit) {
                throw "Unable to create exact release tag $tag at $($manifest.versionCommit)."
              }
            }
          }
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release upload $tag @evidence --clobber
              if ($LASTEXITCODE -eq 0) {
                gh release edit $tag --title "Koan package release $sourceShort / $versionShort" --notes $notes
              }
            }
            else {
              gh release create $tag @evidence `
                --verify-tag `
                --title "Koan package release $sourceShort / $versionShort" `
                --notes $notes
            }
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($attempt -eq 5) { throw "Failed to record release evidence after $attempt attempts." }
            Start-Sleep -Seconds ([Math]::Pow(2, $attempt))
          }

      - name: Summary
        if: always() && steps.lineage.outcome == 'success'
        shell: pwsh
        run: |
          $lineage = Get-Content artifacts/release/release-lineage.json -Raw | ConvertFrom-Json
          $lines = @(
            '# Koan package release impact'
            ''
            "Source: ``$($lineage.sourceCommit)``"
            ''
            "Version commit: ``$($lineage.versionCommit)``"
            ''
            "Breaking closure: $(@($lineage.closurePackages).Count) package(s); generated markers: $(@($lineage.markerPackages).Count)."
          )
          if (Test-Path artifacts/release/release-set.json) {
            $manifest = Get-Content artifacts/release/release-set.json -Raw | ConvertFrom-Json
            $rows = @($manifest.packages | ForEach-Object { "| $($_.packageId) | $($_.previousVersion) | $($_.version) | $($_.reason) |" })
            $lines += @(
              ''
              '| Package | Previous | Version | Reason |'
              '| --- | --- | --- | --- |'
              $rows
            )
          }
          $lines | Out-File $env:GITHUB_STEP_SUMMARY -Append
