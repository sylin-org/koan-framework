name: Release packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v5.2.0
        with:
          global-json-file: global.json

      - name: Require project-local versions
        run: dotnet run --project tools/Koan.Packaging -- inventory --output artifacts/package-inventory.json

      - name: Pack
        shell: pwsh
        run: |
          dotnet pack Koan.sln --configuration Release --artifacts-path artifacts/packages --property:PublicRelease=true --nologo
          if ($LASTEXITCODE -ne 0) { throw 'Solution pack failed.' }

          dotnet pack templates/Sylin.Koan.Templates.csproj --configuration Release --artifacts-path artifacts/packages --property:PublicRelease=true --nologo
          if ($LASTEXITCODE -ne 0) { throw 'Template pack failed.' }

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Repository secret NUGET_API_KEY is required.'
          }

          $packages = @(Get-ChildItem artifacts/packages -Recurse -Filter *.nupkg -File)
          if ($packages.Count -eq 0) {
            throw 'Pack produced no NuGet packages.'
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --source https://api.nuget.org/v3/index.json `
              --api-key $env:NUGET_API_KEY `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) {
              throw "NuGet push failed for $($package.Name)."
            }
          }
