name: disabled-nuget-release

# Superseded by .github/workflows/release-on-main.yml (ARCH-0082).
# Previously: NBGV-driven pack-and-push on push of v* tags. Replaced because
# the new system computes per-package versions from build/versions.props
# (kernel lockstep + periphery independent) rather than NBGV's single-version-
# everywhere model, and the release-on-main workflow handles both tagging and
# publishing in one place.
#
# The old helper scripts under .github/scripts/ (find-packable-csproj.ps1,
# find-changed-csproj.ps1, pack-meta.ps1) are not used by release-on-main.yml
# but are kept in-tree because they may be useful for ad-hoc operations.

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow is disabled. See release-on-main.yml + ARCH-0082."
