name: Release packages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v5.2.0
        with:
          global-json-file: global.json

      - name: Resolve guaranteed package scope
        run: dotnet run --project tools/Koan.Packaging -- product-surface --output artifacts/product-surface.json

      - name: Validate supported API baselines
        run: dotnet run --project tools/Koan.Packaging -- api-baselines

      - name: Pack
        shell: pwsh
        run: |
          dotnet build src/Koan.Core.Registry.Generators/Koan.Core.Registry.Generators.csproj --configuration Release --nologo
          if ($LASTEXITCODE -ne 0) { throw 'Embedded generator build failed.' }

          dotnet pack Koan.sln --configuration Release --artifacts-path artifacts/packages --property:PublicRelease=true --nologo
          if ($LASTEXITCODE -ne 0) { throw 'Solution pack failed.' }

          dotnet pack templates/Sylin.Koan.Templates.csproj --configuration Release --artifacts-path artifacts/packages --property:PublicRelease=true --nologo
          if ($LASTEXITCODE -ne 0) { throw 'Template pack failed.' }

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Repository secret NUGET_API_KEY is required.'
          }

          $surface = Get-Content artifacts/product-surface.json -Raw | ConvertFrom-Json
          $releaseIds = @($surface.packages |
            Where-Object { $_.versionIntent -eq '0.20' } |
            ForEach-Object { $_.packageId } |
            Sort-Object)
          if ($releaseIds.Count -eq 0) {
            throw 'Product surface selected no guaranteed 0.20 packages.'
          }

          $artifacts = @(Get-ChildItem artifacts/packages -Recurse -Filter *.nupkg -File)
          $packages = @(
            foreach ($packageId in $releaseIds) {
              $prefix = "$packageId.0.20."
              $matches = @($artifacts | Where-Object {
                $_.Name.StartsWith($prefix, [System.StringComparison]::OrdinalIgnoreCase)
              })
              if ($matches.Count -ne 1) {
                throw "Guaranteed package '$packageId' matched $($matches.Count) packed 0.20 artifacts; expected exactly one."
              }
              $matches[0]
            }
          )

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --source https://api.nuget.org/v3/index.json `
              --api-key $env:NUGET_API_KEY `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) {
              throw "NuGet push failed for $($package.Name)."
            }
          }
