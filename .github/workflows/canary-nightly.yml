name: Native provider proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: native-provider-proof-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  testing-containers:
    name: PostgreSQL container lifecycle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact merge candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Exercise the real PostgreSQL provider boundary
        run: >-
          dotnet test
          tests/Suites/Testing/Koan.Testing.Containers.Tests/Koan.Testing.Containers.Tests.csproj
          --configuration Release
          --filter FullyQualifiedName=Koan.Testing.Containers.Tests.ContainerNativeLifecycleSpec.Postgres_fixture_supports_two_complete_owned_lifecycles
