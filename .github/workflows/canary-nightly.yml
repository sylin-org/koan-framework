name: native-admission

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: native-admission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  native-admission:
    name: native-admission
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact merge candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Evaluate and run native admission
        shell: pwsh
        run: >-
          dotnet run --configuration Release --project tools/Koan.Packaging --
          native-admission
          --base "${{ github.event.pull_request.base.sha }}"
          --candidate "${{ github.sha }}"
          --configuration Release
