# ─────────────────────────────────────────────────────────────────────────────
# PR gate — cheap repository-coherence validation on pull requests.
#
# A main PR proves that the repository compiles and its product/API/docs/tooling projections agree.
# Behavioral evidence belongs to the affected project or capability family while the change is
# developed. Whole-repository certification is an explicit milestone activity, not a merge or
# publication prerequisite.
#
# Package publication remains owned by release-on-main.yml after merge and runs no tests.
# ─────────────────────────────────────────────────────────────────────────────

name: PR gate

on:
  pull_request:
    branches: [main]

# One gate run per PR; a newer push cancels the older in-flight run.
concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history so doc-code can diff vs the base branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET (per global.json)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Compile product surface and reject generated drift
        run: dotnet run --project tools/Koan.Packaging -- product-surface --check

      - name: Validate supported API baselines
        run: dotnet run --project tools/Koan.Packaging -- api-baselines

      - name: Repository coherence (build + lockfile + docs/tooling lint; no tests)
        shell: pwsh
        run: |
          ./scripts/green-ratchet.ps1 -Configuration Release -Base "origin/${{ github.event.pull_request.base.ref }}" -SkipTests

      - name: Validate the surface ledger
        shell: bash
        run: bash scripts/lint-surfaces.sh docs/SURFACES.md
